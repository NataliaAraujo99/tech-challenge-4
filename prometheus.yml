global:
  scrape_interval: 15s # O Prometheus vai buscar métricas a cada 15 segundos

scrape_configs:
  - job_name: 'fastapi-app'
    static_configs:
      - targets: ['localhost:8000'] # Endereço da sua API FastAPI

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090'] # O próprio Prometheus se monitorando